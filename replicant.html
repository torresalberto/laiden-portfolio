<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>laiden</title>
  <link rel="preload" as="image" href="public/images/001_laiden.jpg">
  <link rel="preload" as="image" href="public/images/002_laiden.jpg">
  <link rel="preload" as="image" href="public/images/003_laiden.jpg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #0a0a0a;
      --ember: #c4785a;
      --ember-glow: rgba(196, 120, 90, 0.35);
      --steel: #00a0c0;
      --steel-glow: rgba(0, 160, 192, 0.35);
      --fade-duration: 1800ms;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-breathe: cubic-bezier(0.37, 0, 0.63, 1);
      --contact-size: 48px;
      --bottom-padding: 40px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void);
    }

    canvas#particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .gallery {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slides {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--fade-duration) var(--ease-smooth);
      pointer-events: none;
    }

    .slide.active { opacity: 1; pointer-events: auto; }

    .slide.flicker-out { animation: flickerOut 200ms steps(1) forwards; }

    .slide.scan-up img { animation: scanUp 600ms var(--ease-smooth) forwards; }

    .slide.joi-pulse img { animation: joiPulse 2000ms var(--ease-breathe) forwards; }

    @keyframes flickerOut {
      0% { opacity: 1; }
      20% { opacity: 0.3; }
      40% { opacity: 0.8; }
      60% { opacity: 0.2; }
      80% { opacity: 0.5; }
      100% { opacity: 0; }
    }

    @keyframes scanUp {
      0% { clip-path: inset(100% 0 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }

    @keyframes joiPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }

    .slide::before,
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      mix-blend-mode: screen;
      opacity: 0.15;
    }

    .slide.active::before {
      background: radial-gradient(ellipse at center, currentColor 0%, transparent 70%);
      opacity: 0.08;
    }

    .slide.active::after {
      background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 0, 0, 0.03) 1px, rgba(0, 0, 0, 0.03) 2px);
      opacity: 1;
      z-index: 4;
    }

    .slide.warm::before { color: var(--ember); }
    .slide.cool::before { color: var(--steel); }

    .slide.warm img { filter: drop-shadow(0 0 60px rgba(196, 120, 90, 0.12)); }
    .slide.cool img { filter: drop-shadow(0 0 60px rgba(0, 160, 192, 0.12)); }

    .haze {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30%;
      background: linear-gradient(to top, var(--void) 0%, transparent 100%);
      z-index: 5;
      pointer-events: none;
    }

    .progress-bar {
      position: fixed;
      bottom: calc(var(--bottom-padding) + 20px);
      left: 10%;
      right: 10%;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      z-index: 10;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--steel), var(--ember));
      transition: width 600ms var(--ease-smooth);
      box-shadow: 0 0 8px currentColor;
    }

    .contact {
      position: fixed;
      bottom: var(--bottom-padding);
      right: var(--bottom-padding);
      width: var(--contact-size);
      height: var(--contact-size);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 600ms var(--ease-smooth);
      z-index: 20;
      text-decoration: none;
    }

    .contact:hover {
      background: var(--ember);
      border-color: var(--ember);
      box-shadow: 0 0 30px var(--ember-glow);
      transform: scale(1.08);
      animation: contactFlicker 400ms steps(1);
    }

    @keyframes contactFlicker {
      0% { opacity: 1; }
      25% { opacity: 0.6; }
      50% { opacity: 0.9; }
      75% { opacity: 0.7; }
      100% { opacity: 1; }
    }

    .contact svg {
      width: 20px;
      height: 20px;
      stroke: rgba(255, 255, 255, 0.35);
      fill: none;
      stroke-width: 1.5;
      transition: stroke 600ms var(--ease-smooth);
    }

    .contact:hover svg { stroke: #fff; }

    @media (max-width: 768px) {
      :root { --contact-size: 56px; --bottom-padding: 60px; }
      .progress-bar { left: 5%; right: 5%; }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <main class="gallery" role="main">
    <div class="slides"></div>
  </main>
  <div class="haze"></div>
  <div class="progress-bar"><div class="progress-bar-fill"></div></div>

  <a href="https://instagram.com/laiden" class="contact" aria-label="Send message on Instagram" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
  </a>

  <script>
    const images = [
      'public/images/001_laiden.jpg', 'public/images/002_laiden.jpg', 'public/images/003_laiden.jpg',
      'public/images/004_laiden.jpg', 'public/images/005_laiden.jpg', 'public/images/006_laiden.jpg',
      'public/images/007_laiden.jpg', 'public/images/008_laiden.jpg', 'public/images/009_laiden.jpg',
      'public/images/010_laiden.jpg', 'public/images/011_laiden.jpg', 'public/images/012_laiden.jpg',
      'public/images/013_laiden.jpg', 'public/images/014_laiden.jpg', 'public/images/015_laiden.jpg',
      'public/images/016_laiden.jpg', 'public/images/017_laiden.jpg', 'public/images/018_laiden.jpg',
      'public/images/019_laiden.jpg', 'public/images/020_laiden.jpg', 'public/images/021_laiden.jpg',
      'public/images/022_laiden.jpg', 'public/images/023_laiden.jpg', 'public/images/024_laiden.jpg',
      'public/images/025_laiden.jpg', 'public/images/026_laiden.jpg', 'public/images/027_laiden.png',
      'public/images/028_laiden.png', 'public/images/029_laiden.png', 'public/images/030_laiden.png',
      'public/images/031_laiden.png', 'public/images/032_laiden.png', 'public/images/033_laiden.png',
      'public/images/034_laiden.png', 'public/images/035_laiden.png', 'public/images/036_laiden.png',
      'public/images/037_laiden.png', 'public/images/038_laiden.png', 'public/images/039_laiden.png'
    ];

    const warmthData = [
      1.15, 1.03, 1.46, 1.01, 2.92, 1.01, 3.77, 1.84, 3.90, 6.12, 0.13, 0.21, 0.41, 1.56,
      0.14, 2.51, 0.41, 1.83, 0.30, 0.13, 1.18, 0.46, 0.17, 0.40, 0.57, 0.72, 1.50, 3.29,
      2.75, 1.11, 0.34, 0.73, 2.18, 1.03, 0.10, 0.32, 0.92, 0.69, 1.07
    ];

    function isWarm(index) { return warmthData[index] > 1.0; }

    const state = {
      currentIndex: 0,
      isTransitioning: false,
      autoAdvanceTimer: null,
      isPaused: false,
      particleColor: { r: 196, g: 120, b: 90 }
    };

    const slidesContainer = document.querySelector('.slides');
    const progressBar = document.querySelector('.progress-bar-fill');
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    const particles = [];
    const PARTICLE_COUNT = 150;

    function initParticles() {
      particles.length = 0;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          speed: 0.15 + Math.random() * 0.35,
          drift: (Math.random() - 0.5) * 0.3,
          opacity: 0.02 + Math.random() * 0.04,
          size: 0.5 + Math.random() * 1.5
        });
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const { r, g, b } = state.particleColor;

      particles.forEach(p => {
        p.y += p.speed;
        p.x += p.drift;

        if (p.y > canvas.height + 10) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
        if (p.x < -10) p.x = canvas.width + 10;
        if (p.x > canvas.width + 10) p.x = -10;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.opacity})`;
        ctx.fill();
      });

      requestAnimationFrame(animateParticles);
    }

    function updateParticleColor(index) {
      const target = isWarm(index) ? { r: 196, g: 120, b: 90 } : { r: 0, g: 160, b: 192 };
      state.particleColor.r += (target.r - state.particleColor.r) * 0.02;
      state.particleColor.g += (target.g - state.particleColor.g) * 0.02;
      state.particleColor.b += (target.b - state.particleColor.b) * 0.02;
    }

    function buildSlides() {
      images.forEach((src, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide' + (i === 0 ? ' active' : '') + (isWarm(i) ? ' warm' : ' cool');
        slide.innerHTML = `<img src="${src}" alt="" loading="${i < 3 ? 'eager' : 'lazy'}">`;
        slidesContainer.appendChild(slide);
      });
    }

    function getSlides() { return slidesContainer.querySelectorAll('.slide'); }

    function updateProgress(index) {
      const pct = ((index + 1) / images.length) * 100;
      progressBar.style.width = pct + '%';
      const hue = isWarm(index) ? 20 : 190;
      progressBar.style.color = `hsl(${hue}, 60%, 50%)`;
    }

    function showSlide(index, isJoi = false) {
      if (state.isTransitioning) return;
      state.isTransitioning = true;

      const slides = getSlides();
      const currentSlide = slides[state.currentIndex];

      currentSlide.classList.remove('active');
      currentSlide.classList.add('flicker-out');

      setTimeout(() => {
        currentSlide.classList.remove('flicker-out', 'scan-up', 'joi-pulse');

        const nextSlide = slides[index];
        nextSlide.classList.add('active', 'scan-up');
        if (isJoi) nextSlide.classList.add('joi-pulse');

        nextSlide.querySelector('img').addEventListener('animationend', () => {
          nextSlide.classList.remove('scan-up', 'joi-pulse');
        }, { once: true });

        state.currentIndex = index;
        updateProgress(index);
        preloadAdjacent(2);
        updateParticleColor(index);

        setTimeout(() => { state.isTransitioning = false; }, 1800);
      }, 200);
    }

    function next() {
      const nextIndex = (state.currentIndex + 1) % images.length;
      const isJoi = (nextIndex + 1) % 7 === 0;
      showSlide(nextIndex, isJoi);
      resetAutoAdvance();
    }

    function prev() {
      const prevIndex = (state.currentIndex - 1 + images.length) % images.length;
      showSlide(prevIndex);
      resetAutoAdvance();
    }

    function goTo(index) {
      if (index !== state.currentIndex) {
        const isJoi = (index + 1) % 7 === 0;
        showSlide(index, isJoi);
        resetAutoAdvance();
      }
    }

    function preloadAdjacent(count) {
      for (let i = 1; i <= count; i++) {
        new Image().src = images[(state.currentIndex + i) % images.length];
        if (i > 1) new Image().src = images[(state.currentIndex - i + images.length) % images.length];
      }
    }

    function startAutoAdvance() {
      stopAutoAdvance();
      state.autoAdvanceTimer = setInterval(next, 8000);
    }

    function stopAutoAdvance() {
      if (state.autoAdvanceTimer) { clearInterval(state.autoAdvanceTimer); state.autoAdvanceTimer = null; }
    }

    function pauseAutoAdvance() { state.isPaused = true; stopAutoAdvance(); }
    function resumeAutoAdvance() { state.isPaused = false; startAutoAdvance(); }

    function resetAutoAdvance() {
      stopAutoAdvance();
      setTimeout(() => { if (!state.isPaused) startAutoAdvance(); }, 3000);
    }

    let scrollTimeout;
    function handleScroll(e) {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => { e.deltaY > 0 ? next() : prev(); }, 1200);
    }

    let touchStartX = 0, touchStartY = 0;
    function handleTouchStart(e) { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; pauseAutoAdvance(); }

    function handleTouchEnd(e) {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const threshold = window.innerWidth < 768 ? 40 : 50;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) { dx > 0 ? prev() : next(); }
      setTimeout(resumeAutoAdvance, 3000);
    }

    function handleClick(e) {
      const width = window.innerWidth;
      e.clientX > width * 0.4 ? next() : prev();
    }

    function handleKey(e) {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
      else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
      else if (e.key === 'Home') { e.preventDefault(); goTo(0); }
      else if (e.key === 'End') { e.preventDefault(); goTo(images.length - 1); }
    }

    function init() {
      resizeCanvas();
      initParticles();
      animateParticles();
      buildSlides();
      updateProgress(0);
      preloadAdjacent(2);
      updateParticleColor(0);

      setTimeout(() => {
        const firstSlide = getSlides()[0];
        firstSlide.classList.add('flicker-out');
        setTimeout(() => {
          firstSlide.classList.remove('flicker-out', 'scan-up');
          firstSlide.classList.add('active', 'scan-up');
          firstSlide.querySelector('img').addEventListener('animationend', () => firstSlide.classList.remove('scan-up'), { once: true });
        }, 200);
        startAutoAdvance();
      }, 500);

      document.querySelector('.gallery').addEventListener('click', handleClick);
      document.addEventListener('keydown', handleKey);
      document.addEventListener('touchstart', handleTouchStart, { passive: true });
      document.addEventListener('touchend', handleTouchEnd, { passive: true });
      document.addEventListener('wheel', handleScroll, { passive: true });
      window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

      const contact = document.querySelector('.contact');
      contact.addEventListener('mouseenter', pauseAutoAdvance);
      contact.addEventListener('mouseleave', resumeAutoAdvance);
    }

    init();
  </script>
</body>
</html>

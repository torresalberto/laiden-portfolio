<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <title>laiden</title>
  <link rel="preload" as="image" href="public/images/001_laiden.jpg">
  <link rel="preload" as="image" href="public/images/002_laiden.jpg">
  <link rel="preload" as="image" href="public/images/003_laiden.jpg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --void: #0a0a0a;
      --charcoal: #1a1a1a;
      --ember: #c4785a;
      --ember-glow: rgba(196, 120, 90, 0.35);
      --gold: #a08060;
      --rose: #806060;
      --ocean: #0a2a3a;
      --steel: #00a0c0;
      --fog: #606060;
      --bone: #e0e0e0;
      --ui-subtle: rgba(255, 255, 255, 0.15);
      --ui-visible: rgba(255, 255, 255, 0.35);
      --fade-duration: 1200ms;
      --kenburns-duration: 10000ms;
      --ui-transition: 400ms;
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-gentle: cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-breathe: cubic-bezier(0.37, 0, 0.63, 1);
      --contact-size: 48px;
      --contact-size-mobile: 56px;
      --dot-size: 5px;
      --dot-active-size: 7px;
      --dot-gap: 10px;
      --bottom-padding: 40px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--void);
      font-family: system-ui, sans-serif;
    }

    .gallery {
      position: fixed;
      inset: 0;
      background: var(--void);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slides {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity var(--fade-duration) var(--ease-smooth);
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      transform: scale(1);
      animation: kenburns var(--kenburns-duration) var(--ease-breathe) infinite;
    }

    .slide.active img {
      animation-play-state: running;
    }

    @keyframes kenburns {
      0% { transform: scale(1); }
      100% { transform: scale(1.015); }
    }

    .progress {
      position: fixed;
      bottom: var(--bottom-padding);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: var(--dot-gap);
      z-index: 10;
      padding: 10px;
    }

    .dot {
      width: var(--dot-size);
      height: var(--dot-size);
      border-radius: 50%;
      background: var(--ui-subtle);
      border: none;
      cursor: pointer;
      transition: all 300ms var(--ease-smooth);
      padding: 0;
    }

    .dot:hover {
      background: var(--ui-visible);
      transform: scale(1.2);
    }

    .dot.active {
      width: var(--dot-active-size);
      height: var(--dot-active-size);
      background: var(--ui-visible);
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.15);
    }

    .contact {
      position: fixed;
      bottom: var(--bottom-padding);
      right: var(--bottom-padding);
      width: var(--contact-size);
      height: var(--contact-size);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--ui-transition) var(--ease-smooth);
      z-index: 20;
      text-decoration: none;
    }

    .contact:hover {
      background: var(--ember);
      border-color: var(--ember);
      box-shadow: 0 0 24px var(--ember-glow);
      transform: scale(1.08);
    }

    .contact svg {
      width: 20px;
      height: 20px;
      stroke: rgba(255, 255, 255, 0.5);
      fill: none;
      stroke-width: 1.5;
      transition: stroke var(--ui-transition) var(--ease-smooth);
    }

    .contact:hover svg {
      stroke: #fff;
    }

    @media (max-width: 768px) {
      :root {
        --contact-size: var(--contact-size-mobile);
        --dot-size: 4px;
        --dot-active-size: 6px;
        --bottom-padding: 60px;
      }

      .slide img {
        animation-duration: 8000ms;
      }
    }
  </style>
</head>
<body>
  <main class="gallery" role="main">
    <div class="slides"></div>
  </main>
  
  <nav class="progress" role="navigation" aria-label="Image navigation"></nav>
  
  <a href="https://instagram.com/laiden" class="contact" aria-label="Send message on Instagram" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
    </svg>
  </a>

  <script>
    const images = [
      'public/images/001_laiden.jpg',
      'public/images/002_laiden.jpg',
      'public/images/003_laiden.jpg',
      'public/images/004_laiden.jpg',
      'public/images/005_laiden.jpg',
      'public/images/006_laiden.jpg',
      'public/images/007_laiden.jpg',
      'public/images/008_laiden.jpg',
      'public/images/009_laiden.jpg',
      'public/images/010_laiden.jpg',
      'public/images/011_laiden.jpg',
      'public/images/012_laiden.jpg',
      'public/images/013_laiden.jpg',
      'public/images/014_laiden.jpg',
      'public/images/015_laiden.jpg',
      'public/images/016_laiden.jpg',
      'public/images/017_laiden.jpg',
      'public/images/018_laiden.jpg',
      'public/images/019_laiden.jpg',
      'public/images/020_laiden.jpg',
      'public/images/021_laiden.jpg',
      'public/images/022_laiden.jpg',
      'public/images/023_laiden.jpg',
      'public/images/024_laiden.jpg',
      'public/images/025_laiden.jpg',
      'public/images/026_laiden.jpg',
      'public/images/027_laiden.png',
      'public/images/028_laiden.png',
      'public/images/029_laiden.png',
      'public/images/030_laiden.png',
      'public/images/031_laiden.png',
      'public/images/032_laiden.png',
      'public/images/033_laiden.png',
      'public/images/034_laiden.png',
      'public/images/035_laiden.png',
      'public/images/036_laiden.png',
      'public/images/037_laiden.png',
      'public/images/038_laiden.png',
      'public/images/039_laiden.png'
    ];

    const state = {
      currentIndex: 0,
      isTransitioning: false,
      autoAdvanceTimer: null,
      isPaused: false,
      lastInteractionTime: 0
    };

    const isMobile = () => window.innerWidth < 768;
    const getInterval = () => isMobile() ? 8000 : 6000;

    const slidesContainer = document.querySelector('.slides');
    const progressContainer = document.querySelector('.progress');

    function buildSlides() {
      images.forEach((src, i) => {
        const slide = document.createElement('div');
        slide.className = 'slide' + (i === 0 ? ' active' : '');
        slide.innerHTML = `<img src="${src}" alt="" loading="${i < 3 ? 'eager' : 'lazy'}">`;
        slidesContainer.appendChild(slide);
      });
    }

    function buildDots() {
      images.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `Go to image ${i + 1}`);
        dot.addEventListener('click', () => goTo(i));
        progressContainer.appendChild(dot);
      });
    }

    function getSlides() { return slidesContainer.querySelectorAll('.slide'); }
    function getDots() { return progressContainer.querySelectorAll('.dot'); }

    function showSlide(index) {
      if (state.isTransitioning) return;
      state.isTransitioning = true;

      const slides = getSlides();
      const dots = getDots();

      slides.forEach((s, i) => {
        s.classList.toggle('active', i === index);
        if (i === index) {
          const img = s.querySelector('img');
          if (!img.complete) {
            img.addEventListener('load', () => {}, { once: true });
          }
        }
      });

      dots.forEach((d, i) => d.classList.toggle('active', i === index));

      state.currentIndex = index;
      preloadAdjacent(2);

      setTimeout(() => {
        state.isTransitioning = false;
      }, 1200);
    }

    function next() {
      const nextIndex = (state.currentIndex + 1) % images.length;
      showSlide(nextIndex);
      resetAutoAdvance();
    }

    function prev() {
      const prevIndex = (state.currentIndex - 1 + images.length) % images.length;
      showSlide(prevIndex);
      resetAutoAdvance();
    }

    function goTo(index) {
      if (index !== state.currentIndex) {
        showSlide(index);
        resetAutoAdvance();
      }
    }

    function isFirst() { return state.currentIndex === 0; }
    function isLast() { return state.currentIndex === images.length - 1; }

    function preloadAdjacent(count) {
      for (let i = 1; i <= count; i++) {
        const nextIdx = (state.currentIndex + i) % images.length;
        const prevIdx = (state.currentIndex - i + images.length) % images.length;
        new Image().src = images[nextIdx];
        if (i > 1) new Image().src = images[prevIdx];
      }
    }

    function startAutoAdvance() {
      stopAutoAdvance();
      state.autoAdvanceTimer = setInterval(next, getInterval());
    }

    function stopAutoAdvance() {
      if (state.autoAdvanceTimer) {
        clearInterval(state.autoAdvanceTimer);
        state.autoAdvanceTimer = null;
      }
    }

    function pauseAutoAdvance() {
      state.isPaused = true;
      stopAutoAdvance();
    }

    function resumeAutoAdvance() {
      state.isPaused = false;
      startAutoAdvance();
    }

    function resetAutoAdvance() {
      state.lastInteractionTime = Date.now();
      stopAutoAdvance();
      setTimeout(() => {
        if (!state.isPaused) startAutoAdvance();
      }, 3000);
    }

    let scrollTimeout;
    function handleScroll(e) {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        if (e.deltaY > 0) next();
        else prev();
      }, 800);
    }

    let touchStartX = 0;
    let touchStartY = 0;

    function handleTouchStart(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      pauseAutoAdvance();
    }

    function handleTouchEnd(e) {
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;
      const threshold = isMobile() ? 40 : 50;

      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > threshold) {
        if (dx > 0) prev();
        else next();
      }

      setTimeout(resumeAutoAdvance, 3000);
    }

    function handleClick(e) {
      const x = e.clientX;
      const width = window.innerWidth;
      
      if (x > width * 0.4) next();
      else prev();
    }

    function handleKey(e) {
      switch(e.key) {
        case 'ArrowRight':
        case ' ':
          e.preventDefault();
          next();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          prev();
          break;
        case 'Home':
          e.preventDefault();
          goTo(0);
          break;
        case 'End':
          e.preventDefault();
          goTo(images.length - 1);
          break;
      }
    }

    function init() {
      buildSlides();
      buildDots();
      preloadAdjacent(2);
      showSlide(0);
      startAutoAdvance();

      const gallery = document.querySelector('.gallery');
      gallery.addEventListener('click', handleClick);
      document.addEventListener('keydown', handleKey);
      
      document.addEventListener('touchstart', handleTouchStart, { passive: true });
      document.addEventListener('touchend', handleTouchEnd, { passive: true });
      
      document.addEventListener('wheel', handleScroll, { passive: true });

      const contact = document.querySelector('.contact');
      contact.addEventListener('mouseenter', pauseAutoAdvance);
      contact.addEventListener('mouseleave', resumeAutoAdvance);
    }

    init();
  </script>
</body>
</html>
